# =============================================================================
#  BTT SFS 2.0 + RP2040-Zero  —  standalone USB filament sensor
#  Include from printer.cfg:   [include sfs.cfg]
#  Docs: ../docs/04-klipper-integration.md
# =============================================================================
#
#  BEFORE USE:
#   1) Set the serial below to YOUR board (see: ls /dev/serial/by-id/).
#      Three RP2040s share the same VID:PID on this rig — unplug this Pico
#      and see which /dev/serial/by-id entry disappears to identify it.
#   2) Power the SFS at 3.3 V (the RP2040 is NOT 5 V-tolerant).
#   3) Keep the ^ pull-ups (SFS outputs are open-collector / switch-to-ground).
#   4) Bring up with pause_on_runout: False, confirm in Mainsail, then arm.
# =============================================================================

[mcu sfs]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5303284738FB5E1C-if00

# --- Motion / encoder (GREEN wire -> GP0) : clog / slip / no-movement ---------
[filament_motion_sensor sfs_motion]
switch_pin: ^sfs:gpio0
detection_length: 2.88          # mm, SFS theoretical pulse pitch; raise if false triggers
extruder: extruder
pause_on_runout: False
# runout_gcode:  RESPOND MSG="SFS motion: NO MOVEMENT"

# --- Switch / runout (BLUE wire -> GP1) : filament presence ------------------
[filament_switch_sensor sfs_switch]
switch_pin: ^sfs:gpio1
pause_on_runout: False
# runout_gcode:  RESPOND MSG="SFS switch: RUNOUT"
# insert_gcode:  RESPOND MSG="SFS switch: filament present"
